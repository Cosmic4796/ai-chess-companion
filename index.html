<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chess Companion</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Chess board CSS -->
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/popups.css">
</head>
<body>

<div class="app-layout">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo-icon">&#9822;</span>
      <h1 class="logo-text">AI Chess Companion</h1>
    </div>
    <div class="header-right">
      <button class="btn btn-outline" id="btn-explain" onclick="Analysis.explainPosition()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Explain Position
      </button>
      <button class="btn btn-icon" id="btn-settings" onclick="UI.toggleSettings()" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- Left Sidebar -->
  <aside class="left-sidebar">
    <!-- Game Info -->
    <div class="card" id="game-info-card">
      <div class="card-header">
        <h3>Game Info</h3>
      </div>
      <div class="card-body">
        <div class="turn-row">
          <div class="turn-indicator">
            <span class="turn-dot" id="turn-dot"></span>
            <span id="turn-text">White to move</span>
          </div>
        </div>
        <div class="material-bar-container" id="material-container" style="display:none">
          <div class="material-label">
            <span id="material-white">White</span>
            <span id="material-diff"></span>
            <span id="material-black">Black</span>
          </div>
          <div class="material-bar">
            <div class="material-fill" id="material-fill" style="width:50%"></div>
          </div>
        </div>
        <div class="move-count-row">
          <span class="text-muted">Move</span>
          <span id="move-number">0</span>
        </div>
      </div>
    </div>

    <!-- Opening banner placeholder -->
    <div id="opening-slot"></div>

    <!-- Move History -->
    <div class="card move-history-card">
      <div class="card-header">
        <h3>Move History</h3>
      </div>
      <div class="card-body">
        <div class="move-list" id="move-list">
          <span class="text-muted italic">No moves yet</span>
        </div>
      </div>
    </div>

    <!-- Game Controls -->
    <div class="card">
      <div class="card-header">
        <h3>Controls</h3>
      </div>
      <div class="card-body controls-body">
        <button class="btn btn-primary btn-sm" onclick="App.newGame()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          New Game
        </button>
        <button class="btn btn-secondary btn-sm" onclick="Board.undoMove()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
          Undo
        </button>
        <button class="btn btn-secondary btn-sm" onclick="Board.flipBoard()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Flip
        </button>
        <button class="btn btn-secondary btn-sm" onclick="App.copyFen()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          FEN
        </button>
        <button class="btn btn-secondary btn-sm" onclick="App.exportPgn()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PGN
        </button>
      </div>
    </div>

    <!-- Difficulty -->
    <div class="card">
      <div class="card-header">
        <h3>Difficulty</h3>
      </div>
      <div class="card-body">
        <div class="pill-group" id="difficulty-pills">
          <button class="pill" data-val="easy" onclick="App.setDifficulty('easy')">Easy</button>
          <button class="pill active" data-val="medium" onclick="App.setDifficulty('medium')">Medium</button>
          <button class="pill" data-val="hard" onclick="App.setDifficulty('hard')">Hard</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Center: Board -->
  <main class="board-wrapper your-turn" id="board-wrapper">
    <div id="board-container">
      <div id="board" style="width: 100%"></div>
    </div>
    <div class="status-bar" id="status-bar">
      <span id="status-text">Your turn — drag a piece to move</span>
    </div>
  </main>

  <!-- Right Sidebar -->
  <aside class="right-sidebar">
    <!-- Coach Analysis -->
    <div class="coach-section">
      <div class="section-header">
        <h3>Coach Says</h3>
        <span class="gold-line"></span>
      </div>
      <div class="coach-content" id="coach-content">
        <p class="text-muted italic">Make a move to get analysis...</p>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-section">
      <div class="section-header">
        <h3>Ask the Coach</h3>
        <button class="btn-ghost" onclick="Chat.clear()" title="Clear chat">Clear</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="Ask about strategy, openings, tactics..." autocomplete="off">
        <button class="chat-send" id="chat-send" onclick="Chat.send()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </aside>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Modal Overlay -->
<div class="modal-backdrop" id="modal-backdrop" onclick="UI.closeModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="UI.closeModal()">&times;</button>
    <h2 class="modal-title" id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settings-overlay" onclick="UI.toggleSettings()"></div>
<div class="settings-drawer" id="settings-drawer">
  <div class="settings-header">
    <h2>Settings</h2>
    <button class="btn-ghost" onclick="UI.toggleSettings()">&times;</button>
  </div>
  <div class="setting-group">
    <label>Auto-Analysis</label>
    <div class="toggle" onclick="UI.toggleAnalysis()">
      <div class="toggle-track on" id="analysis-toggle"><div class="toggle-thumb"></div></div>
      <span id="analysis-label">On</span>
    </div>
  </div>
  <div class="setting-group">
    <label>Board Theme</label>
    <div class="toggle" onclick="UI.toggleBoardTheme()">
      <div class="toggle-track" id="theme-toggle"><div class="toggle-thumb"></div></div>
      <span id="theme-label">Dark</span>
    </div>
  </div>
</div>

<!-- Dependencies -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<!-- App Scripts -->
<script src="js/ai.js"></script>
<script src="js/ui.js"></script>
<script src="js/board.js"></script>
<script src="js/analysis.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>

</body>
</html>
